<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#FFF8E8"/>
  <!-- Mur -->
  <rect x="0" y="0" width="400" height="200" fill="#F2EBD9"/>
  <!-- Boîte DAE -->
  <g transform="translate(200,150)">
    <rect x="-50" y="-60" width="100" height="120" fill="#2D8659" stroke="#0F1B3D" stroke-width="2" rx="4"/>
    <!-- Croix blanche -->
    <rect x="-25" y="-15" width="50" height="12" fill="#FFF"/>
    <rect x="-6" y="-34" width="12" height="50" fill="#FFF"/>
    <text x="0" y="50" text-anchor="middle" font-family="DM Sans" font-size="16" fill="#FFF" font-weight="700">DAE</text>
    <!-- Cadre -->
    <rect x="-55" y="-65" width="110" height="130" fill="none" stroke="#FFB800" stroke-width="3" rx="6"/>
  </g>
  <!-- Panneau directionnel -->
  <g transform="translate(80,80)">
    <rect x="-40" y="-25" width="80" height="50" fill="#2D8659" stroke="#0F1B3D" stroke-width="1" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="DM Sans" font-size="11" fill="#FFF" font-weight="700">DAE</text>
    <text x="0" y="12" text-anchor="middle" font-family="DM Sans" font-size="20" fill="#FFF" font-weight="700">→</text>
  </g>
  <!-- Sol -->
  <rect x="0" y="200" width="400" height="100" fill="#7A7568"/>
  <text x="200" y="270" text-anchor="middle" font-family="DM Sans" font-size="11" fill="#FFB800" font-weight="700">DÉFIBRILLATEUR — OBLIGATOIRE ERP CAT. 5</text>
  <text x="200" y="288" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#FFE08A">Décret 2018-1186 · applicable depuis 01/01/2022</text>
