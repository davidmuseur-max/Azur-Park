<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#3F4A6B"/>
  <!-- Sol terre -->
  <rect x="0" y="200" width="400" height="100" fill="#7A6B58"/>
  <!-- Boîtier électrique au sol -->
  <g transform="translate(200,210)">
    <rect x="-40" y="-30" width="80" height="50" fill="#5C5448" stroke="#0F1B3D" stroke-width="2"/>
    <rect x="-35" y="-25" width="70" height="40" fill="#FFB800"/>
    <!-- Symbole danger électrique -->
    <polygon points="-10,-15 5,-15 -2,0 8,0 -5,15 -3,5 -12,5" fill="#0F1B3D"/>
    <!-- Câbles -->
    <path d="M -50,15 Q -80,5 -100,30 Q -120,50 -140,40" stroke="#0F1B3D" stroke-width="3" fill="none"/>
    <path d="M 50,15 Q 80,25 110,15 Q 140,0 170,20" stroke="#0F1B3D" stroke-width="3" fill="none"/>
  </g>
  <!-- Eau -->
  <ellipse cx="180" cy="245" rx="40" ry="6" fill="#1A6FE8" opacity="0.5"/>
  <ellipse cx="240" cy="240" rx="30" ry="5" fill="#1A6FE8" opacity="0.5"/>
  <!-- Panneau danger -->
  <g transform="translate(80,100)">
    <polygon points="-30,30 30,30 0,-25" fill="#FFB800" stroke="#0F1B3D" stroke-width="3"/>
    <text x="0" y="20" text-anchor="middle" font-family="DM Sans" font-size="22" fill="#0F1B3D" font-weight="900">⚡</text>
  </g>
  <text x="200" y="40" text-anchor="middle" font-family="DM Sans" font-size="14" fill="#D63D2E" font-weight="700">RISQUE VITAL — FE-01</text>
  <text x="200" y="60" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#FFE08A">Score 25/25 · action immédiate obligatoire</text>
  <text x="200" y="290" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#FFB800" font-weight="600">ÉQUIPEMENT ÉLECTRIQUE EXPOSÉ EN ZONE EXTÉRIEURE</text>
</svg>
