<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#3F4A6B"/>
  <!-- Toit atelier -->
  <polygon points="50,50 200,30 350,50 350,90 50,90" fill="#7A7568"/>
  <!-- Murs -->
  <rect x="50" y="90" width="300" height="180" fill="#9C9485"/>
  <!-- Porte -->
  <rect x="170" y="180" width="60" height="90" fill="#5C5448" stroke="#0F1B3D" stroke-width="1"/>
  <!-- Fenêtres -->
  <rect x="80" y="120" width="40" height="40" fill="#1A6FE8" opacity="0.6" stroke="#5C5448"/>
  <rect x="280" y="120" width="40" height="40" fill="#1A6FE8" opacity="0.6" stroke="#5C5448"/>
  <!-- Panneau ATTENTION -->
  <g transform="translate(200,140)">
    <polygon points="-15,-15 15,-15 18,15 -18,15" fill="#FFB800" stroke="#0F1B3D" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="DM Sans" font-size="14" fill="#0F1B3D" font-weight="700">!</text>
  </g>
  <!-- Bidons -->
  <ellipse cx="80" cy="260" rx="12" ry="4" fill="#0F1B3D"/>
  <rect x="68" y="240" width="24" height="22" fill="#D63D2E" stroke="#0F1B3D" stroke-width="0.5"/>
  <ellipse cx="105" cy="260" rx="10" ry="3" fill="#0F1B3D"/>
  <rect x="95" y="245" width="20" height="18" fill="#FFB800" stroke="#0F1B3D" stroke-width="0.5"/>
  <!-- Sol -->
  <rect x="0" y="270" width="400" height="30" fill="#0F1B3D"/>
  <text x="200" y="288" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#FFB800" font-weight="600">ATELIER MAINTENANCE · ZONE FE-02 / FI-01</text>
</svg>
