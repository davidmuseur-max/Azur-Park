<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#FFF8E8"/>
  <!-- Casque -->
  <g transform="translate(80,150)">
    <ellipse cx="0" cy="0" rx="40" ry="35" fill="#FFB800" stroke="#0F1B3D" stroke-width="2"/>
    <ellipse cx="0" cy="20" rx="42" ry="8" fill="#0F1B3D"/>
    <rect x="-3" y="-30" width="6" height="20" fill="#0F1B3D"/>
    <text x="0" y="60" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#0F1B3D" font-weight="600">CASQUE</text>
  </g>
  <!-- Chaussures sécurité -->
  <g transform="translate(200,150)">
    <ellipse cx="-15" cy="20" rx="25" ry="8" fill="#0F1B3D"/>
    <path d="M -35,15 Q -35,-15 -10,-15 L 5,-15 Q 15,-15 15,-5 L 15,20 Z" fill="#5C5448" stroke="#0F1B3D" stroke-width="2"/>
    <ellipse cx="0" cy="-15" rx="15" ry="5" fill="#0F1B3D"/>
    <text x="0" y="60" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#0F1B3D" font-weight="600">CHAUSSURES SÉCU</text>
  </g>
  <!-- Gants -->
  <g transform="translate(320,150)">
    <path d="M -25,30 L -25,-10 Q -25,-20 -20,-20 L -15,-20 L -15,-30 L -10,-30 L -10,-20 L -5,-20 L -5,-32 L 0,-32 L 0,-20 L 5,-20 L 5,-30 L 10,-30 L 10,-20 L 15,-20 L 15,-15 L 20,-15 Q 25,-15 25,-10 L 25,30 Z" fill="#1A6FE8" stroke="#0F1B3D" stroke-width="2"/>
    <text x="0" y="60" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#0F1B3D" font-weight="600">GANTS</text>
  </g>
  <!-- Bandeau titre -->
  <rect x="0" y="0" width="400" height="50" fill="#0049A8"/>
  <text x="200" y="22" text-anchor="middle" font-family="Fraunces" font-size="16" fill="#FFB800" font-weight="600">ÉQUIPEMENTS DE PROTECTION INDIVIDUELLE</text>
  <text x="200" y="38" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#FFE08A">Art. R.4323-95 et R.4323-104 du Code du travail</text>
  <!-- Bandeau bas -->
  <rect x="0" y="250" width="400" height="50" fill="#FFB800"/>
  <text x="200" y="275" text-anchor="middle" font-family="DM Sans" font-size="11" fill="#0F1B3D" font-weight="700">ATTESTATION DE REMISE EPI · à signer à l'embauche</text>
  <text x="200" y="290" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#0F1B3D">Norme EN ISO 20345 · EN ISO 20471 · EN 388</text>
</svg>
