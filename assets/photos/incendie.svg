<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#D63D2E"/>
      <stop offset="0.5" stop-color="#FFB800"/>
      <stop offset="1" stop-color="#FFE08A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0F1B3D"/>
  <!-- Cartons empilés -->
  <g transform="translate(150,180)">
    <rect x="0" y="0" width="60" height="40" fill="#C19463" stroke="#7A6B58" stroke-width="1"/>
    <rect x="65" y="0" width="50" height="40" fill="#A07845" stroke="#7A6B58" stroke-width="1"/>
    <rect x="10" y="-35" width="55" height="35" fill="#C19463" stroke="#7A6B58" stroke-width="1"/>
    <rect x="68" y="-30" width="48" height="30" fill="#A07845" stroke="#7A6B58" stroke-width="1"/>
    <rect x="20" y="-65" width="50" height="30" fill="#C19463" stroke="#7A6B58" stroke-width="1"/>
  </g>
  <!-- Flamme -->
  <g transform="translate(200,140)">
    <path d="M 0,-50 Q -25,-20 -20,10 Q -10,25 0,30 Q 10,25 20,10 Q 25,-20 0,-50" fill="url(#flame)" opacity="0.9"/>
    <path d="M 0,-30 Q -12,-10 -8,5 Q 0,15 8,5 Q 12,-10 0,-30" fill="#FFE08A"/>
  </g>
  <!-- Sol -->
  <rect x="0" y="220" width="400" height="80" fill="#1a3a6e"/>
  <!-- Pictogramme alerte -->
  <g transform="translate(60,60)">
    <polygon points="-25,25 25,25 0,-20" fill="#D63D2E" stroke="#FFF" stroke-width="2"/>
    <text x="0" y="18" text-anchor="middle" font-family="DM Sans" font-size="22" fill="#FFF" font-weight="900">!</text>
  </g>
  <text x="200" y="40" text-anchor="middle" font-family="DM Sans" font-size="14" fill="#FFB800" font-weight="700">RISQUE INCENDIE — FI-02</text>
  <text x="200" y="60" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#FFE08A">Charge calorifique 5 000-7 000 MJ</text>
  <text x="200" y="290" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#FFB800" font-weight="600">CARTONS EMPILÉS — REMORQUE STOCKAGE</text>
</svg>
