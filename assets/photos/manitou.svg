<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94BCD9"/>
      <stop offset="0.7" stop-color="#A8C99C"/>
      <stop offset="1" stop-color="#86B07A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)"/>
  <!-- Soleil -->
  <circle cx="340" cy="60" r="25" fill="#FFB800" opacity="0.9"/>
  <!-- Manitou (chariot télescopique stylisé) -->
  <g transform="translate(80,180)">
    <!-- Châssis -->
    <rect x="0" y="50" width="120" height="40" fill="#FFB800" stroke="#0F1B3D" stroke-width="2" rx="3"/>
    <!-- Cabine -->
    <rect x="80" y="20" width="50" height="35" fill="#D63D2E" stroke="#0F1B3D" stroke-width="2" rx="3"/>
    <rect x="85" y="25" width="40" height="20" fill="#94BCD9" stroke="#0F1B3D" stroke-width="1"/>
    <!-- Bras télescopique levé -->
    <polygon points="50,50 200,15 230,5 240,15 60,60" fill="#FFB800" stroke="#0F1B3D" stroke-width="2"/>
    <!-- Fourche -->
    <rect x="225" y="0" width="20" height="25" fill="#0F1B3D"/>
    <line x1="225" y1="25" x2="225" y2="40" stroke="#0F1B3D" stroke-width="3"/>
    <line x1="245" y1="25" x2="245" y2="40" stroke="#0F1B3D" stroke-width="3"/>
    <!-- Roues -->
    <circle cx="20" cy="100" r="18" fill="#0F1B3D"/>
    <circle cx="20" cy="100" r="8" fill="#5C5448"/>
    <circle cx="100" cy="100" r="18" fill="#0F1B3D"/>
    <circle cx="100" cy="100" r="8" fill="#5C5448"/>
    <!-- Stabilisateur -->
    <line x1="-10" y1="80" x2="-15" y2="115" stroke="#0F1B3D" stroke-width="3"/>
    <rect x="-25" y="115" width="20" height="6" fill="#0F1B3D"/>
  </g>
  <!-- Sol -->
  <rect x="0" y="280" width="400" height="20" fill="#5C5448"/>
  <text x="200" y="294" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#FFB800" font-weight="600">MANITOU MT 1740 SLT · 4 000 kg · 16,65 m · CACES R482 cat. F</text>
</svg>
